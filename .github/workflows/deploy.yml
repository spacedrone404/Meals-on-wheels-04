name: Build and Deploy Frontend
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: npm ci
        
      - name: Build Webpack
        run: npm run build
          
      - name: Upload Compiled Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # IMPORTANT: Change 'dist' to whatever folder Webpack outputs your compiled files to.
          path: './dist' 
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
